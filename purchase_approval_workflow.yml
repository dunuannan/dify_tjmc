      您好！我是采购用款审批AI审核助手。


      请上传以下三份文档进行审核：

      1. **设备购置计划表**

      2. **项目需求书**

      3. **调研报告**


      请尽量上传 **PDF / DOCX / HTML / HTM** 格式文件。

      如文档为扫描件、页码缺失、盖章不清或存在人工补充说明，请在“补充说明”中注明。


      请填写您的**项目名称**和**预算金额**，审核完成后将自动生成审核报告。

      '
