    - data:
        desc: ''
        selected: false
        template: |-
          审核任务：天津海运职业学院企业捐赠资料审核

          说明：
          1. 这是纯 Dify 工作流，没有外部解析服务。
          2. 下列文本来自 Dify 文档提取器，可能因 OCR、扫描质量、旧版 Office 文件或表格结构导致信息缺失。
          3. 如果某项文本缺失、乱码、证据不足，请在审核报告中明确写“需人工复核”，不要自行编造。

          资料包名称：{% if package_name %}{{ package_name }}{% else %}未填写{% endif %}
          用户选择的项目类型：{{ project_type }}
          补充说明：{% if reviewer_notes %}{{ reviewer_notes }}{% else %}无{% endif %}

          【捐赠协议文本】
          {{ agreement_text }}

          【捐赠资产明细表文本】
          {{ asset_detail_text }}

          【资产评估报告文本】
          {{ appraisal_report_text }}

          【法律意见书文本】
          {{ legal_opinion_text }}
        title: 组装审核资料
        type: template-transform
        variables:
        - value_selector:
          - start_node
          - package_name
          variable: package_name
        - value_selector:
          - start_node
          - project_type
          variable: project_type
        - value_selector:
          - agreement_extractor
          - text
          variable: agreement_text
        - value_selector:
          - asset_detail_extractor
          - text
          variable: asset_detail_text
        - value_selector:
          - appraisal_extractor
          - text
          variable: appraisal_report_text
        - value_selector:
          - legal_opinion_extractor
          - text
          variable: legal_opinion_text
        - value_selector:
          - start_node
          - reviewer_notes
          variable: reviewer_notes
      height: 53
      id: review_package
      position:
        x: 700
